[project]
name = "second-brain"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "python-dotenv>=1.0",
    "qdrant-client>=1.9",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
second-brain = "second_brain.main:main"

[tool.pytest.ini_options]
markers = [
    "integration: tests requiring a running Qdrant instance",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
